services:
  # https://github.com/felipewom/docker-compose-postgres/blob/main/README.md
  postgres:
    image: 'postgres:16'
    ports:
      - 5432:5432
    env_file:
      - .env
    networks:
      - lego-network
    volumes:
      - lego-db-volume:/var/lib/postgresql/data/:rw
    healthcheck:
      test:
        [
          "CMD-SHELL",                         # Use the shell form to execute the health check command
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" # Check if PostgreSQL is ready
        ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
  
  pgwebadmin:
    image: dpage/pgadmin4
#    user: "${UID}:${GID}"
    ports:
      - 8888:80
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    networks:
      - lego-network
    volumes:
      - lego-pgadmin-volume:/var/lib/pgadmin/:rw

  lego_inventory:
    image: lego_inventory
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    ports:
      - "8080:8080"
    networks:
      - lego-network
    volumes:
      - lego-volume:/home/app/.local/share:rw

volumes:
  lego-volume:
  lego-db-volume:
  lego-pgadmin-volume:

networks: 
  lego-network:
    driver: bridge